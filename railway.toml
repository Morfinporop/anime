[build]
builder = "NIXPACKS"

[build.nixpacks]
# Собираем фронтенд перед запуском
buildCommand = "npm run build"

[deploy]
startCommand = "npm run server"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Переменные окружения (задаются в Railway Dashboard):
# DATABASE_URL — автоматически от Railway Postgres
# JWT_SECRET — секрет для подписи токенов (сгенерируйте случайную строку)
# ADMIN_USERNAME — по умолчанию Morfin
# ADMIN_PASSWORD — пароль админа (смените!)
# PORT — порт (Railway задаёт автоматически)
# FRONTEND_URL — URL вашего фронтенда (для CORS)
